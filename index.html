<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLOWFRAME 3D Gallery</title>
  </head>
  <body>
    <canvas id="galleryCanvas" aria-label="3D 立体画廊"></canvas>

    <header class="topbar">
      <a class="brand" href="#top" aria-label="返回顶部">
        <span class="brand-mark"></span>
        <span>FLOWFRAME</span>
      </a>
      <nav class="topnav" aria-label="主导航">
        <a href="#gallery">画廊</a>
        <a href="#collection">影像</a>
        <a href="#credits">分工</a>
      </nav>
      <button class="icon-button" id="soundToggle" type="button" aria-label="声音开关" title="声音开关">
        <i data-lucide="volume-2"></i>
      </button>
    </header>

    <main id="top" class="experience-shell">
      <section class="intro-panel" id="gallery">
        <p class="kicker">Web 可交互视效流媒体展示</p>
        <h1>空间化影像展厅</h1>
        <p>
          以 3D 画廊组织作品封面，结合滚动镜头、悬停反馈和影像式画册详情，形成沉浸浏览体验。
        </p>
        <button class="primary-action" id="openActiveWork" type="button">
          <i data-lucide="play"></i>
          <span>进入当前画册</span>
        </button>
      </section>

      <aside class="work-panel" id="collection" aria-live="polite">
        <p class="work-index" id="workIndex">01 / 06</p>
        <h2 id="workTitle">Loading</h2>
        <p id="workMeta">Interactive visual stream</p>
        <p id="workDescription"></p>
        <div class="work-tags" id="workTags"></div>
      </aside>

      <aside class="progress-rail" aria-label="作品进度">
        <div class="rail-line"><span id="railProgress"></span></div>
        <div class="rail-items" id="railItems"></div>
      </aside>

      <section class="credits-panel" id="credits">
        <h2>制作分工</h2>
        <dl>
          <div>
            <dt>李若深</dt>
            <dd>3D 画廊场景与整体聚合</dd>
          </div>
          <div>
            <dt>王天昱</dt>
            <dd>响应式整合与声画反馈</dd>
          </div>
          <div>
            <dt>朱晨宇</dt>
            <dd>镜头运动、滚动叙事与粒子效果</dd>
          </div>
        </dl>
      </section>
    </main>

    <div class="hover-label" id="hoverLabel" aria-hidden="true"></div>

    <section class="album-view" id="albumView" aria-hidden="true">
      <div class="album-backdrop"></div>
      <article class="album-panel">
        <div class="album-stage">
          <img id="albumImage" alt="" />
          <div class="album-screen-glow"></div>
        </div>
        <div class="album-copy">
          <div class="album-toolbar">
            <button class="icon-button" id="closeAlbum" type="button" aria-label="返回画廊" title="返回画廊">
              <i data-lucide="arrow-left"></i>
            </button>
            <div class="album-count" id="albumCount">01 / 03</div>
            <div class="album-controls">
              <button class="icon-button" id="prevImage" type="button" aria-label="上一张" title="上一张">
                <i data-lucide="arrow-left"></i>
              </button>
              <button class="icon-button" id="nextImage" type="button" aria-label="下一张" title="下一张">
                <i data-lucide="arrow-right"></i>
              </button>
            </div>
          </div>
          <p class="work-index" id="albumIndex">01</p>
          <h2 id="albumTitle">Title</h2>
          <p id="albumDescription"></p>
          <div class="album-specs" id="albumSpecs"></div>
        </div>
      </article>
    </section>

    <div class="scroll-spacer" aria-hidden="true"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
